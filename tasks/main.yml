---
- name: Check if Sublime Text is already installed
  ansible.builtin.command: dpkg-query -W {{ sublime_package_name }}
  register: sublime_installed
  failed_when: false
  changed_when: false

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: sublime_installed.rc != 0

- name: Download Sublime Text GPG key
  ansible.builtin.get_url:
    url: "{{ sublime_gpg_key_url }}"
    dest: "{{ sublime_gpg_key_tmp }}"
    mode: '0644'
  when: sublime_installed.rc != 0

- name: Convert key to apt keyring format
  ansible.builtin.command: >
    gpg --dearmor --yes --output {{ sublime_gpg_keyring }} {{ sublime_gpg_key_tmp }}
  args:
    creates: "{{ sublime_gpg_keyring }}"
  become: true
  when: sublime_installed.rc != 0

- name: Remove temporary GPG key file
  ansible.builtin.file:
    path: "{{ sublime_gpg_key_tmp }}"
    state: absent
  when: sublime_installed.rc != 0

- name: Add Sublime Text apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ sublime_gpg_keyring }}] https://download.sublimetext.com/ apt/stable/"
    state: present
  become: true
  when: sublime_installed.rc != 0

- name: Install Sublime Text
  ansible.builtin.apt:
    name: "{{ sublime_package_name }}"
    state: present
    update_cache: true
  become: true
  when: sublime_installed.rc != 0
